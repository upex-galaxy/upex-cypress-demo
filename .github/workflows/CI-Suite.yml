# рҹ§ҷрҹҸ»вҖҚвҷӮпёҸBIENVENIDO A LOS PIPELINES DE CONTINUOUS INTEGRATION DE "ARI - Hija de Aurora"!tu ID del TX
# рҹӨ–Este Pipeline de CI se activa al PUSHEAR, y consiste en ejecutar los tests de una US e importar los resultados a Jira!рҹҡҖ
# рҹ‘©рҹҸ»вҖҚрҹ”¬Para utilizar este Pipeline de Ari, sigue los siguientes pasos:
#     1ro: debes modificar el script: "npm run file" + tu archivo de Prueba Ejecutable (ver ejemplo en este archivo)
#     2do: debes modificar la propiedad: "testExecKey:" + tu ID del TX de Jira para importar automГЎticamente el resultado.
#     3ro: guarda los cambios en el repositorio local (git add + git commit) y envГӯalos al Repo Remoto (git push)
#     Expected Result: DeberГӯa ejecutarse este Pipeline de GitHub Actions y correr cada uno de los Jobs declarados aquГӯ.

name: рҹӨ–CI run (BUILD) Test Suite ExecutionвҡЎ
run-name: ${{github.actor}}рҹ‘ЁрҹҸ»вҖҚрҹ”¬ run Test Suite in ${{github.ref_name}}

on: # This Run is a template. The correct "Run On" should be: Any except QA and Main
    push:
        branches-ignore:
            - main
            - QA

jobs:
    Build-Cypress-TestSuite-AfterPush:
        runs-on: ubuntu-latest

        steps:
            - name: рҹ’»Checkout
              uses: actions/checkout@v3

            - name: рҹ’ҝInstall Node.js
              uses: actions/setup-node@v3
              with:
                  node-version: 16

            - name: рҹ’ҝYarn Setup
              uses: DerYeger/yarn-setup-action@master
              with:
                  node-version: 16

            - name: рҹ§¬Install All Dependencies
              run: |
                  yarn

            - name: рҹ’ҫDownload Cucumber-Formatter
              uses: suisei-cn/actions-download-file@v1.3.0
              with:
                  url: '[Linux-cucumber-formatter](https://github.com/cucumber/json-formatter/releases/download/v19.0.0/cucumber-json-formatter-linux-amd64)'
                  target: cucumber-formatter/
                  auto-match: true

            - name: рҹ”§Install Cucumber-Formatter
              run: |
                  mv cucumber-formatter/cucumber-json-formatter-linux-amd64 cucumber-formatter/cucumber-json-formatter
                  chmod +x cucumber-formatter/cucumber-json-formatter

            - name: рҹ§ӘCypress Run Test Coverage in Chrome
              uses: cypress-io/github-action@v4
              with:
                  browser: chrome
                  command: | #EDITAR AQUГҚ EL ARCHIVO SUITE A EJECUTAR:
                      yarn file cypress\e2e\Tests\Elements\GX-29792_RadioButtons.cy.js

            - name: вң…Import Test Results to Xray
              if: always()
              uses: mikepenz/xray-action@v2
              with: #OPCIONES PARA IMPORTAR LOS RESULTADOS DE PRUEBA A JIRA XRAY:
                  username: ${{secrets.XRAY_CLIENT_ID}}
                  password: ${{secrets.XRAY_CLIENT_SECRET}}
                  testFormat: 'junit' #OPCIONES PARA CAMBIAR: 'junit' (para xml) o 'cucumber' (para json)
                  testPaths: 'reports/test-results.xml' #OPCIONES: '/test-results.xml' o 'cucumber-report.json'
                  testExecKey: 'GX-29794' #EDITAR AQUГҚ EL TEST EXECUTION A IMPORTAR LAS PRUEBAS.
                  projectKey: 'GX' #EDITAR EN CASO DE TRABAJAR CON OTRO PROYECTO.

            - name: рҹ””Slack Notification of Done
              if: always()
              uses: rtCamp/action-slack-notify@v2.2.0
              env:
                  SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
                  SLACK_USERNAME: AriвңЁ
                  SLACK_MESSAGE: ':test_tube: Tests run in ToolsQA: User Story Test Execution is Done and updated in Jira :rocket:'
                  SLACK_COLOR: ${{ job.status }}
                  SLACK_ICON: https://i.imgur.com/q9kvQCp_d.webp?maxwidth=760&fidelity=grand
